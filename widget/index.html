<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src https: data:; style-src 'self' 'unsafe-inline'; script-src 'self';" />
<title>WorldCup</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app" class="widget compact">
    <!-- drag bar / controls -->
    <div class="bar">
      <span class="brand">
        <svg class="logo" width="15" height="16" viewBox="0 0 32 32" aria-hidden="true">
          <path d="M7 6H4.3a3.7 3.7 0 0 0 3.7 3.7 M25 6h2.7a3.7 3.7 0 0 1-3.7 3.7" fill="none" stroke="#e0a92a" stroke-width="2" stroke-linecap="round"/>
          <path d="M7 3.5h18v5.5a9 9 0 0 1-18 0z" fill="#f4c430"/>
          <path d="M14.5 17.5h3v4h-3z" fill="#e0a92a"/>
          <path d="M11 21.5h10l1.6 4h-13.2z" fill="#f4c430"/>
          <rect x="8.5" y="25.5" width="15" height="3" rx="1.3" fill="#e0a92a"/>
        </svg>
        <span class="title" id="title">World Cup 2026</span>
      </span>
      <span class="controls">
        <button id="fresh" class="fresh" title="Click to refresh now" hidden></button>
        <button id="btn-pick" title="Pick match">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3 4.5h10M3 8h10M3 11.5h10"/></svg>
        </button>
        <button id="btn-parlays" title="Daily parlays">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M2.6 5.6V4.2a.7.7 0 0 1 .7-.7h9.4a.7.7 0 0 1 .7.7v1.4a1.4 1.4 0 0 0 0 4.8v1.4a.7.7 0 0 1-.7.7H3.3a.7.7 0 0 1-.7-.7v-1.4a1.4 1.4 0 0 1 0-4.8z"/><path d="M10 4v8" stroke-dasharray="1.4 1.6"/></svg>
        </button>
        <button id="btn-record" title="Record &amp; history">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3 13.3V9.2M8 13.3V3.5M13 13.3V6.4" stroke-width="1.7"/></svg>
        </button>
        <button id="btn-standings" title="Standings / bracket">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M2.5 3v10M2.5 8h3.5M6 5.2v5.6M6 5.2h3.5M6 10.8h3.5M9.5 8h4"/></svg>
        </button>
        <button id="btn-expand" title="Expand / collapse">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M9.5 2.7h3.8v3.8M6.5 13.3H2.7V9.5M13.3 2.7 9 7M2.7 13.3 7 9"/></svg>
        </button>
        <button id="btn-pin" title="Always on top">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 10v3.5M4.7 3.5h6.6M6.1 3.5l-.5 4L4.2 9.2h7.6L10.4 7.5l-.5-4"/></svg>
        </button>
        <button id="btn-quit" title="Quit">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M4.2 4.2l7.6 7.6M11.8 4.2l-7.6 7.6"/></svg>
        </button>
      </span>
    </div>

    <div class="body" id="body">
      <div id="loading" class="center"><div class="spinner"></div><div class="muted">Loading…</div></div>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
