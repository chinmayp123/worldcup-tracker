<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src https: data:; style-src 'self' 'unsafe-inline'; script-src 'self';" />
<title>WorldCup</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app" class="widget compact">
    <!-- drag bar / controls -->
    <div class="bar">
      <span class="brand">
        <svg class="logo" width="15" height="16" viewBox="0 0 32 32" aria-hidden="true">
          <path d="M7 6H4.3a3.7 3.7 0 0 0 3.7 3.7 M25 6h2.7a3.7 3.7 0 0 1-3.7 3.7" fill="none" stroke="#e0a92a" stroke-width="2" stroke-linecap="round"/>
          <path d="M7 3.5h18v5.5a9 9 0 0 1-18 0z" fill="#f4c430"/>
          <path d="M14.5 17.5h3v4h-3z" fill="#e0a92a"/>
          <path d="M11 21.5h10l1.6 4h-13.2z" fill="#f4c430"/>
          <rect x="8.5" y="25.5" width="15" height="3" rx="1.3" fill="#e0a92a"/>
        </svg>
        <span class="title" id="title">World Cup 2026</span>
      </span>
      <span class="controls">
        <button id="btn-pick" title="Pick match">≡</button>
        <button id="btn-expand" title="Expand / collapse">⤢</button>
        <button id="btn-pin" title="Always on top">📌</button>
        <button id="btn-quit" title="Quit">✕</button>
      </span>
    </div>

    <div class="body" id="body">
      <div id="loading" class="muted center">Loading…</div>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
